<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>WebAR - 扫码体验</title>

  <!-- ========================================
       CDN 库必须在 <head> 中加载！
       A-Frame 在解析到 <a-scene> 时就会初始化，
       如果脚本在 <body> 底部，<a-scene> 会被当作
       普通 DOM 元素，导致 AR 完全不工作。
  ========================================= -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ===== 封面页 ===== */
    #cover-page {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      z-index: 9999;
      overflow-y: auto;
    }

    #cover-page::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      top: -50px; right: -50px;
      border-radius: 50%;
    }

    #cover-page::after {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
      bottom: -30px; left: -30px;
      border-radius: 50%;
    }

    #cover-page.hidden { display: none; }

    .cover-logo {
      font-size: 64px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .cover-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      text-align: center;
      background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cover-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 40px;
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }

    .cover-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 48px;
      width: 100%;
      max-width: 320px;
      position: relative;
      z-index: 1;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text-secondary);
    }

    .feature-icon {
      width: 36px; height: 36px;
      background: rgba(99,102,241,0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ===== 主按钮 ===== */
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 24px rgba(99,102,241,0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    /* ===== AR HUD 覆盖层 ===== */
    #ar-hud {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
    }

    #ar-hud.active { display: block; }

    #ar-hud > * { pointer-events: auto; }

    /* 顶部状态栏 */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    #top-bar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-close {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-close:active { background: rgba(239,68,68,0.3); }

    /* 底部状态卡片 */
    #status-card {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 41, 59, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 240px;
      transition: all 0.4s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    #status-card.success {
      border-color: rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.12);
    }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #f59e0b;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.scanning { animation: pulse 1.5s ease-in-out infinite; }

    #status-card.success .status-dot { background: var(--success); }

    #status-text {
      font-size: 14px;
      color: var(--text-primary);
    }

    /* 扫描提示 */
    #scan-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    #scan-hint.hidden { display: none; }

    .hint-frame {
      width: 200px; height: 200px;
      border: 2px solid rgba(99,102,241,0.4);
      border-radius: 16px;
      margin: 0 auto 20px;
      position: relative;
    }

    .hint-frame::before {
      content: '';
      position: absolute;
      left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: scanLine 2s ease-in-out infinite;
    }

    @keyframes scanLine {
      0%   { top: 10%; opacity: 0.4; }
      50%  { top: 85%; opacity: 1; }
      100% { top: 10%; opacity: 0.4; }
    }

    .hint-text {
      font-size: 15px;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    /* 控制面板 */
    #control-panel {
      display: none;
      position: absolute;
      top: 60px;
      right: 16px;
      background: rgba(30, 41, 59, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      min-width: 200px;
    }

    #control-panel.active { display: block; }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .panel-btn {
      width: 100%;
      padding: 10px 14px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
      text-align: left;
    }

    .panel-btn:active {
      background: rgba(99,102,241,0.35);
    }

    .panel-btn:last-child { margin-bottom: 0; }

    /* Toast 通知 */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(30,41,59,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      max-width: 90vw;
      text-align: center;
      color: var(--text-primary);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 权限申请遮罩 */
    #permission-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.96);
      z-index: 10001;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    #permission-overlay.active { display: flex; }

    .perm-icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    .perm-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      text-align: center;
      color: var(--text-primary);
    }

    .perm-desc {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      max-width: 300px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .perm-list {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 32px;
    }

    .perm-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 8px 0;
    }

    .perm-item:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .perm-check {
      color: var(--success);
      font-size: 16px;
    }

    /* 隐藏 A-Frame 默认 UI */
    .a-enter-vr, .a-enter-ar,
    .a-loader-title,
    .a-canvas + .a-loader-title { display: none !important; }
  </style>
</head>
<body>

  <!-- =====================================================
       封面页
  ====================================================== -->
  <div id="cover-page">
    <div class="cover-logo">📱</div>
    <h1 class="cover-title">WebAR 体验</h1>
    <p class="cover-subtitle">扫描标记图片，即可在真实环境中看到炫酷的3D增强现实效果</p>

    <div class="cover-features">
      <div class="feature-item">
        <div class="feature-icon">📷</div>
        <span>无需下载任何App，打开即用</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🎯</div>
        <span>对准标记图片自动识别</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon">✨</div>
        <span>3D模型动画实时展示</span>
      </div>
    </div>

    <button class="btn-primary" id="btn-start">
      <span>🚀</span>
      <span>开始体验 AR</span>
    </button>
  </div>

  <!-- =====================================================
       权限申请遮罩
  ====================================================== -->
  <div id="permission-overlay">
    <div class="perm-icon">📷</div>
    <h2 class="perm-title">需要摄像头权限</h2>
    <p class="perm-desc">WebAR 需要使用您的摄像头来扫描标记并显示3D增强现实内容，请允许授权。</p>
    <div class="perm-list">
      <div class="perm-item">
        <span class="perm-check">✓</span>
        <span>仅在本地处理，不会上传任何数据</span>
      </div>
      <div class="perm-item">
        <span class="perm-check">✓</span>
        <span>使用 HTTPS 安全连接</span>
      </div>
      <div class="perm-item">
        <span class="perm-check">✓</span>
        <span>支持 iOS / Android / PC</span>
      </div>
    </div>
    <button class="btn-primary" id="btn-permit">
      <span>✅</span>
      <span>授权并开始</span>
    </button>
  </div>

  <!-- =====================================================
       Toast 通知
  ====================================================== -->
  <div id="toast"></div>

  <!-- =====================================================
       AR HUD 覆盖层（浮在 a-scene 上方的 UI）
  ====================================================== -->
  <div id="ar-hud">
    <div id="top-bar">
      <div id="top-bar-title">
        <span class="live-dot"></span>
        AR 运行中
      </div>
      <button class="btn-close" id="btn-close-ar">✕</button>
    </div>

    <div id="scan-hint">
      <div class="hint-frame"></div>
      <div class="hint-text">将摄像头对准标记图片</div>
    </div>

    <div id="control-panel">
      <div class="panel-title">模型控制</div>
      <button class="panel-btn" id="btn-toggle-anim">⏯ 暂停/播放动画</button>
      <button class="panel-btn" id="btn-reset">🔄 还原位置</button>
      <button class="panel-btn" id="btn-bigger">🔍 放大 20%</button>
      <button class="panel-btn" id="btn-smaller">🔍 缩小 20%</button>
    </div>

    <div id="status-card">
      <div class="status-dot scanning" id="status-dot"></div>
      <div id="status-text">正在扫描...</div>
    </div>
  </div>

  <!-- =====================================================
       A-Frame AR 场景
       注意：<a-scene> 不能放在 display:none 的容器里！
       它必须始终存在于 DOM 中，由 AR.js 控制摄像头。
       我们通过封面页遮盖它，点击按钮后移除封面。
  ====================================================== -->
  <a-scene
    id="ar-scene"
    embedded
    arjs="sourceType: webcam;
          debugUIEnabled: false;
          detectionMode: mono_and_matrix;
          matrixCodeType: 3x3;
          maxDetectionRate: 60;
          patternRatio: 0.7;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; precision: highp"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
    style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;">

    <!-- AR 摄像机 -->
    <a-entity camera></a-entity>

    <!-- ============================================
         标记 1：玩偶
         扫描 wanou.png 标记图 → 显示 wanou.glb 3D模型
    ============================================= -->
    <a-marker
      type="pattern"
      url="wanou.patt"
      smooth="true"
      smoothCount="5"
      smoothTolerance="0.01"
      smoothThreshold="2"
      id="marker-wanou">

      <a-entity
        id="model-wanou"
        gltf-model="url(wanou.glb)"
        scale="0.3 0.3 0.3"
        position="0 0 0"
        rotation="0 0 0"
        class="ar-model"
        animation-mixer
        animation__rotate="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true">
      </a-entity>

      <!-- 模型下方光环 -->
      <a-ring
        position="0 0.005 0"
        rotation="-90 0 0"
        radius-inner="0.18"
        radius-outer="0.22"
        material="color: #6366f1; opacity: 0.25; transparent: true; side: double"
        animation="property: material.opacity; from: 0.1; to: 0.3; dur: 1500; dir: alternate; loop: true">
      </a-ring>

      <!-- 文字标签 -->
      <a-text
        value="Wanou"
        position="0 0.6 0"
        align="center"
        color="#a78bfa"
        width="3"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
      </a-text>

    </a-marker>

    <!-- ============================================
         标记 2：灯笼
         扫描 denglong.png 标记图 → 显示 denglong.glb 3D模型
    ============================================= -->
    <a-marker
      type="pattern"
      url="denglong.patt"
      smooth="true"
      smoothCount="5"
      smoothTolerance="0.01"
      smoothThreshold="2"
      id="marker-denglong">

      <a-entity
        id="model-denglong"
        gltf-model="url(denglong.glb)"
        scale="0.3 0.3 0.3"
        position="0 0 0"
        rotation="0 0 0"
        class="ar-model"
        animation-mixer
        animation__rotate="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true">
      </a-entity>

      <!-- 模型下方光环 -->
      <a-ring
        position="0 0.005 0"
        rotation="-90 0 0"
        radius-inner="0.18"
        radius-outer="0.22"
        material="color: #ef4444; opacity: 0.25; transparent: true; side: double"
        animation="property: material.opacity; from: 0.1; to: 0.3; dur: 1500; dir: alternate; loop: true">
      </a-ring>

      <!-- 文字标签 -->
      <a-text
        value="Denglong"
        position="0 0.6 0"
        align="center"
        color="#ef4444"
        width="3"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
      </a-text>

    </a-marker>

  </a-scene>

  <!-- =====================================================
       脚本区
  ====================================================== -->
  <script>
    /* ====================================================================
       WebAR 双标记识别系统

       标记 1：扫描 wanou.png 标记图 → 显示 wanou.glb 3D模型
       标记 2：扫描 denglong.png 标记图 → 显示 denglong.glb 3D模型

       部署步骤：
       1. 将文件重命名：玩偶.patt → wanou.patt, 玩偶.glb → wanou.glb
                        灯笼.patt → denglong.patt, 灯笼.glb → denglong.glb
       2. 部署到 HTTPS 服务器（GitHub Pages 等）
       3. 用微信扫码打开页面
       4. 将摄像头对准 wanou.png 或 denglong.png 标记图
    ==================================================================== */

    // ============ 全局状态 ============
    let isAnimationPlaying = true;
    let currentScale = 0.3;
    let activeModelEntity = null;
    let activeMarkerName = '';

    // 标记配置表
    const MARKERS = [
      { markerId: 'marker-wanou',    modelId: 'model-wanou',    name: '玩偶' },
      { markerId: 'marker-denglong', modelId: 'model-denglong', name: '灯笼' }
    ];

    // ============ DOM 引用 ============
    const $coverPage   = document.getElementById('cover-page');
    const $permOverlay = document.getElementById('permission-overlay');
    const $arHud       = document.getElementById('ar-hud');
    const $statusCard  = document.getElementById('status-card');
    const $statusDot   = document.getElementById('status-dot');
    const $statusText  = document.getElementById('status-text');
    const $scanHint    = document.getElementById('scan-hint');
    const $ctrlPanel   = document.getElementById('control-panel');
    const $toast       = document.getElementById('toast');

    // ============ 按钮事件绑定 ============
    document.getElementById('btn-start').addEventListener('click', startAR);
    document.getElementById('btn-permit').addEventListener('click', requestCamera);
    document.getElementById('btn-close-ar').addEventListener('click', closeAR);
    document.getElementById('btn-toggle-anim').addEventListener('click', toggleAnimation);
    document.getElementById('btn-reset').addEventListener('click', resetModel);
    document.getElementById('btn-bigger').addEventListener('click', () => changeScale(1.2));
    document.getElementById('btn-smaller').addEventListener('click', () => changeScale(0.8));

    // ============ 开始 AR ============
    function startAR() {
      // 微信内置浏览器在 iOS 上可能不支持 getUserMedia
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast('⚠️ 当前浏览器不支持摄像头，请用系统浏览器打开', 4000);
        return;
      }

      // 检测 HTTPS（微信要求 HTTPS 才能调用摄像头）
      const isSecure = location.protocol === 'https:'
                    || location.hostname === 'localhost'
                    || location.hostname === '127.0.0.1';
      if (!isSecure) {
        showToast('⚠️ 请使用 HTTPS 访问，或部署到 GitHub Pages', 4000);
      }

      $permOverlay.classList.add('active');
    }

    // ============ 请求摄像头权限 ============
    async function requestCamera() {
      $permOverlay.classList.remove('active');

      try {
        // 先测试摄像头权限
        const testStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        // 立即释放，让 AR.js 自己接管
        testStream.getTracks().forEach(t => t.stop());

        // 权限通过 → 隐藏封面，显示 AR HUD
        $coverPage.classList.add('hidden');
        $arHud.classList.add('active');

        showToast('摄像头已启动，请对准标记图片', 3000);

        // 绑定标记事件
        setupMarkerEvents();

      } catch (err) {
        console.error('[WebAR] Camera error:', err);
        handleCameraError(err);
      }
    }

    // ============ 标记识别事件 ============
    function setupMarkerEvents() {
      MARKERS.forEach(({ markerId, modelId, name }) => {
        const marker = document.getElementById(markerId);
        if (!marker) return;

        marker.addEventListener('markerFound', () => {
          console.log(`[AR] 标记识别成功: ${name}`);
          activeModelEntity = document.getElementById(modelId);
          activeMarkerName = name;

          // 更新 UI
          updateStatus(`🎉 识别成功：${name}`, 'success');
          $ctrlPanel.classList.add('active');
          $scanHint.classList.add('hidden');

          // 如果 glb 模型自带动画，animation-mixer 会自动播放
          showToast(`已识别：${name}`, 2000);
        });

        marker.addEventListener('markerLost', () => {
          console.log(`[AR] 标记丢失: ${name}`);
          updateStatus('正在扫描...', 'scanning');
          $ctrlPanel.classList.remove('active');
          $scanHint.classList.remove('hidden');
          activeModelEntity = null;
          activeMarkerName = '';
        });
      });

      // 监听模型加载错误
      MARKERS.forEach(({ modelId, name }) => {
        const entity = document.getElementById(modelId);
        if (!entity) return;
        entity.addEventListener('model-error', (e) => {
          console.error(`[AR] 模型加载失败: ${name}`, e.detail);
          showToast(`⚠️ 模型 ${name} 加载失败，请检查文件`, 4000);
        });
      });
    }

    // ============ 模型控制 ============

    function toggleAnimation() {
      if (!activeModelEntity) { showToast('请先对准标记图片'); return; }

      if (isAnimationPlaying) {
        activeModelEntity.removeAttribute('animation__rotate');
        showToast('动画已暂停');
      } else {
        activeModelEntity.setAttribute('animation__rotate', {
          property: 'rotation',
          to: '0 360 0',
          dur: 8000,
          easing: 'linear',
          loop: true
        });
        showToast('动画已播放');
      }
      isAnimationPlaying = !isAnimationPlaying;
    }

    function resetModel() {
      if (!activeModelEntity) { showToast('请先对准标记图片'); return; }
      currentScale = 0.3;
      activeModelEntity.setAttribute('position', '0 0 0');
      activeModelEntity.setAttribute('rotation', '0 0 0');
      activeModelEntity.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
      activeModelEntity.setAttribute('animation__rotate', {
        property: 'rotation', to: '0 360 0',
        dur: 8000, easing: 'linear', loop: true
      });
      isAnimationPlaying = true;
      showToast('模型已还原');
    }

    function changeScale(factor) {
      if (!activeModelEntity) { showToast('请先对准标记图片'); return; }
      currentScale = Math.max(0.05, Math.min(3, currentScale * factor));
      activeModelEntity.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
      showToast(`缩放: ${Math.round(currentScale / 0.3 * 100)}%`);
    }

    // ============ 关闭 AR ============
    function closeAR() {
      // AR.js 一旦初始化就无法干净地停止，最可靠的方式是刷新页面
      location.reload();
    }

    // ============ 状态更新 ============
    function updateStatus(text, state) {
      $statusText.textContent = text;
      $statusDot.className = 'status-dot';
      $statusCard.className = '';

      if (state === 'success') {
        $statusCard.classList.add('success');
      } else if (state === 'scanning') {
        $statusDot.classList.add('scanning');
      }
    }

    // ============ Toast ============
    let toastTimer = null;
    function showToast(message, duration) {
      clearTimeout(toastTimer);
      $toast.textContent = message;
      $toast.classList.add('show');
      toastTimer = setTimeout(() => $toast.classList.remove('show'), duration || 2500);
    }

    // ============ 摄像头错误处理 ============
    function handleCameraError(err) {
      let message = '摄像头启动失败';
      let hint = '';

      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        message = '摄像头权限被拒绝';
        hint = '请在浏览器设置中允许摄像头访问，然后刷新页面重试。';
      } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
        message = '未找到摄像头';
        hint = '请确认设备已连接摄像头。';
      } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
        message = '摄像头被占用';
        hint = '请关闭其他使用摄像头的应用后重试。';
      } else if (err.name === 'OverconstrainedError') {
        message = '摄像头不支持此配置';
        hint = '请尝试使用默认摄像头。';
      }

      showToast(`${message}。${hint}`, 5000);
    }

    // ============ 捏合缩放（移动端双指） ============
    (function() {
      let lastDist = null;

      document.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && activeModelEntity) {
          e.preventDefault();
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (lastDist !== null) {
            const ratio = dist / lastDist;
            changeScale(ratio);
          }
          lastDist = dist;
        }
      }, { passive: false });

      document.addEventListener('touchend', () => { lastDist = null; });
    })();

    // ============ 页面加载完成 ============
    window.addEventListener('load', () => {
      console.log('[WebAR] 页面加载完成，等待用户操作');
    });
  </script>

</body>
</html>
