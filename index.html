<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WebAR 体验</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: -apple-system, 'PingFang SC', sans-serif; }

    /* 隐藏 A-Frame 默认 UI */
    .a-enter-vr, .a-enter-ar, .a-loader-title { display: none !important; }

    /* ===== 启动遮罩（纯视觉遮挡，不影响 a-scene） ===== */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.5s;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    #splash.gone { display: none; }

    .splash-icon { font-size: 64px; margin-bottom: 20px; }
    .splash-title {
      font-size: 26px; font-weight: 700; margin-bottom: 10px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .splash-desc {
      font-size: 14px; color: #94a3b8; text-align: center;
      max-width: 280px; line-height: 1.6; margin-bottom: 40px;
    }
    .splash-btn {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff; border: none; padding: 16px 48px;
      border-radius: 50px; font-size: 17px; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 24px rgba(99,102,241,0.4);
    }
    .splash-btn:active { transform: scale(0.96); }

    /* ===== HUD ===== */
    #hud {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      pointer-events: none;
    }
    #hud.active { display: block; }
    #hud > * { pointer-events: auto; }

    .hud-top {
      position: absolute; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .hud-title { font-size: 14px; color: #fff; display: flex; align-items: center; gap: 8px; }
    .dot-live { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .btn-x {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 8px; font-size: 18px; cursor: pointer;
    }

    .hud-bottom {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 14px; padding: 12px 22px;
      display: flex; align-items: center; gap: 10px;
      color: #fff; font-size: 14px;
    }
    .dot-status {
      width: 10px; height: 10px; border-radius: 50%;
      background: #f59e0b; animation: blink 1.5s infinite;
    }
    .hud-bottom.found .dot-status { background: #10b981; animation: none; }

    /* 扫描框 */
    #scan-frame {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; text-align: center;
    }
    #scan-frame.hide { display: none; }
    .frame-box {
      width: 180px; height: 180px;
      border: 2px solid rgba(99,102,241,0.5);
      border-radius: 14px; margin: 0 auto 16px; position: relative;
    }
    .frame-box::before {
      content: ''; position: absolute; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(90deg, transparent, #6366f1, transparent);
      animation: scan 2s ease-in-out infinite;
    }
    @keyframes scan { 0%{top:10%;opacity:0.4} 50%{top:85%;opacity:1} 100%{top:10%;opacity:0.4} }
    .frame-text { font-size: 14px; color: rgba(255,255,255,0.7); text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
  </style>
</head>
<body>

  <!-- ★ a-scene 直接写在 HTML 里，让 AR.js 自己管理摄像头 ★ -->
  <a-scene
    embedded
    arjs="sourceType: webcam;
          debugUIEnabled: false;
          detectionMode: mono_and_matrix;
          matrixCodeType: 3x3;
          maxDetectionRate: 60;
          patternRatio: 0.7;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false">

    <a-entity camera></a-entity>

    <!-- 标记 1：玩偶 -->
    <a-marker type="pattern" url="wanou.patt"
      smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2"
      id="marker-wanou">
      <a-entity id="model-wanou"
        gltf-model="url(wanou.glb)"
        scale="0.3 0.3 0.3"
        position="0 0 0"
        animation-mixer
        animation__spin="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true">
      </a-entity>
      <a-ring position="0 0.005 0" rotation="-90 0 0"
        radius-inner="0.18" radius-outer="0.22"
        material="color: #6366f1; opacity: 0.25; transparent: true; side: double"
        animation="property: material.opacity; from: 0.1; to: 0.3; dur: 1500; dir: alternate; loop: true">
      </a-ring>
    </a-marker>

    <!-- 标记 2：灯笼 -->
    <a-marker type="pattern" url="denglong.patt"
      smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2"
      id="marker-denglong">
      <a-entity id="model-denglong"
        gltf-model="url(denglong.glb)"
        scale="0.3 0.3 0.3"
        position="0 0 0"
        animation-mixer
        animation__spin="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true">
      </a-entity>
      <a-ring position="0 0.005 0" rotation="-90 0 0"
        radius-inner="0.18" radius-outer="0.22"
        material="color: #ef4444; opacity: 0.25; transparent: true; side: double"
        animation="property: material.opacity; from: 0.1; to: 0.3; dur: 1500; dir: alternate; loop: true">
      </a-ring>
    </a-marker>

  </a-scene>

  <!-- 启动遮罩（纯视觉层，不干扰 a-scene） -->
  <div id="splash">
    <div class="splash-icon">📱</div>
    <div class="splash-title">WebAR 体验</div>
    <p class="splash-desc">用手机浏览器打开，对准标记图片即可看到 3D 增强现实效果</p>
    <button class="splash-btn" id="btn-go">🚀 开始体验</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-top">
      <div class="hud-title"><span class="dot-live"></span> AR 运行中</div>
      <button class="btn-x" id="btn-close">✕</button>
    </div>
    <div id="scan-frame">
      <div class="frame-box"></div>
      <div class="frame-text">将摄像头对准标记图片</div>
    </div>
    <div class="hud-bottom" id="status-bar">
      <span class="dot-status"></span>
      <span id="status-text">正在扫描...</span>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" style="
    position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-20px);
    background:rgba(0,0,0,0.8); color:#fff; padding:10px 20px; border-radius:10px;
    font-size:14px; z-index:10000; opacity:0; transition:all 0.3s; pointer-events:none;
    max-width:90vw; text-align:center;
  "></div>

  <script>
    // ============ DOM ============
    const splash    = document.getElementById('splash');
    const hud       = document.getElementById('hud');
    const scanFrame = document.getElementById('scan-frame');
    const statusBar = document.getElementById('status-bar');
    const statusTxt = document.getElementById('status-text');
    const toast     = document.getElementById('toast');

    // ============ 启动按钮 ============
    document.getElementById('btn-go').addEventListener('click', function () {
      // 只是移除遮罩，AR.js 已经在后面运行了
      splash.classList.add('hide');
      setTimeout(() => { splash.classList.add('gone'); }, 500);
      hud.classList.add('active');
      showToast('请将摄像头对准标记图片', 3000);
    });

    document.getElementById('btn-close').addEventListener('click', function () {
      location.reload();
    });

    // ============ 标记事件 ============
    const markers = [
      { id: 'marker-wanou',    model: 'model-wanou',    name: '玩偶' },
      { id: 'marker-denglong', model: 'model-denglong', name: '灯笼' },
    ];

    let activeModel = null;

    // 等 a-scene 加载完再绑定
    document.querySelector('a-scene').addEventListener('loaded', function () {
      console.log('[AR] 场景已加载');

      markers.forEach(function (m) {
        const el = document.getElementById(m.id);
        if (!el) return;

        el.addEventListener('markerFound', function () {
          console.log('[AR] 找到: ' + m.name);
          activeModel = document.getElementById(m.model);
          statusTxt.textContent = '🎉 识别成功：' + m.name;
          statusBar.classList.add('found');
          scanFrame.classList.add('hide');
          showToast('已识别：' + m.name, 2000);
        });

        el.addEventListener('markerLost', function () {
          console.log('[AR] 丢失: ' + m.name);
          activeModel = null;
          statusTxt.textContent = '正在扫描...';
          statusBar.classList.remove('found');
          scanFrame.classList.remove('hide');
        });
      });

      // 模型加载错误
      markers.forEach(function (m) {
        const entity = document.getElementById(m.model);
        if (!entity) return;
        entity.addEventListener('model-error', function () {
          showToast('⚠️ 模型 ' + m.name + ' 加载失败', 4000);
        });
      });
    });

    // ============ Toast ============
    let toastTimer = null;
    function showToast(msg, ms) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(-50%) translateY(0)';
      toastTimer = setTimeout(function () {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(-20px)';
      }, ms || 2500);
    }

    // ============ 捏合缩放 ============
    (function () {
      let lastDist = null;
      let scale = 0.3;

      document.addEventListener('touchmove', function (e) {
        if (e.touches.length === 2 && activeModel) {
          e.preventDefault();
          var dx = e.touches[0].clientX - e.touches[1].clientX;
          var dy = e.touches[0].clientY - e.touches[1].clientY;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (lastDist !== null) {
            scale = Math.max(0.05, Math.min(3, scale * (dist / lastDist)));
            activeModel.setAttribute('scale', scale + ' ' + scale + ' ' + scale);
          }
          lastDist = dist;
        }
      }, { passive: false });

      document.addEventListener('touchend', function () { lastDist = null; });
    })();
  </script>

</body>
</html>
